# ═══════════════════════════════════════════════════════════════════════
# countries.yaml — Configuration des pays pour TikTok Scraper
# ═══════════════════════════════════════════════════════════════════════
#
# Structure de chaque pays :
#   langue_code           : code ISO langue (fr, en, ar…)
#   tiktok_locale         : locale TikTok (fr-CI, en-NG…)
#   datacenter_cookie     : datacenter TikTok (fra02, sin01…)
#   hashtags              : liste des hashtags à parcourir (sans #)
#   local_keywords        : mots-clés locaux (villes, gentilés…)
#   strong_signals        : signaux forts pour le score pays
#   default_search_phrases: phrases de recherche thématiques
#   viral_search_phrases  : phrases virales génériques pour filet large
#
# Pour ajouter un pays :
#   Copier un bloc, changer la clé (code ISO-2), remplir les 8 champs.
# ═══════════════════════════════════════════════════════════════════════


# ────────────────────────────────────────────
# FRANCE
# ────────────────────────────────────────────
FR:
  langue_code: "fr"
  tiktok_locale: "fr-FR"
  datacenter_cookie: "fra02"

  hashtags:
    # Identité nationale
    - france
    - francetiktok
    - french
    - francais
    - parisien
    # Villes
    - paris
    - marseille
    - lyon
    - bordeaux
    - toulouse
    - nantes
    - strasbourg
    - montpellier
    - lille
    - nice
    - rennes
    - grenoble
    # Lifestyle viral FR
    - vieparis
    - frenchlife
    - frenchgirl
    - frenchboy
    - viequotidienne
    - humourfrancais
    - sketchfrancais
    - comedie
    # Tendances FR TikTok
    - pourmoi
    - fyp
    - trending
    - viral
    - pourtoi
    - tiktokfrance
    # Niches populaires
    - etudiant
    - lyceen
    - jobetudiant
    - entrepreneurfr
    - businessfr
    - investissementfr

  local_keywords:
    - france
    - paris
    - marseille
    - lyon
    - bordeaux
    - toulouse
    - nantes
    - strasbourg
    - montpellier
    - lille
    - nice
    - rennes
    - grenoble
    - français
    - française
    - parisien
    - parisienne
    - métropole
    - hexagone

  strong_signals:
    - france
    - paris
    - marseille
    - lyon
    - français
    - française
    - hexagone

  default_search_phrases:
    - vlog paris
    - humour français
    - cuisine française
    - lifestyle france
    - etudiant france
    - entrepreneur france
    - france tiktok
    - comedie francaise
    - conseil finance france
    - mode paris

  viral_search_phrases:
    - vlog journee
    - ma routine
    - vie quotidienne
    - day in my life
    - conseil de vie
    - astuce pratique
    - motivation du jour
    - storytime france
    - challenge france
    - trend france


